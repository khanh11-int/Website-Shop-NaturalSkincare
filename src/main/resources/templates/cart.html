<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        body {
            background: #f4f6f9;
            font-family: "Inter", sans-serif;
        }

        .cart-container {
            max-width: 1050px;
            margin: 40px auto;
        }

        .cart-card {
            background: white;
            padding: 30px;
            border-radius: 18px;
            box-shadow: 0 6px 28px rgba(0,0,0,.08);
        }

        /* ---- Cart item ---- */
        .cart-item {
            display: flex;
            align-items: center;
            padding: 22px 0;
            border-bottom: 1px solid #ececec;
            gap: 25px;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-img {
            width: 110px;
            height: 110px;
            object-fit: cover;
            border-radius: 12px;
            flex-shrink: 0;
        }

        .info {
            flex-grow: 1;
            margin-left: 10px;
        }

        .info h5 {
            font-weight: 700;
            margin-bottom: 5px;
        }

        .price {
            color: #000000;
            font-weight: 700;
            margin-top: 5px;
            font-size: 18px;
        }

        /* Quantity section */
        .qty-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-right: 20px;
        }

        .qty-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #bbb;
            background: white;
            font-size: 20px;
            padding: 0;
            line-height: 34px;
        }

        .subtotal {
            width: 140px;
            text-align: right;
            font-size: 20px;
            font-weight: bold;
            color: #000000;
            margin-right: 10px;
        }

        .trash-btn {
            background: #a4d0b1;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 17px;
        }

        /* Total */
        .total-box {
            text-align: right;
            margin-top: 25px;
            margin-bottom: 15px;
            font-size: 24px;
            font-weight: 700;
            color: #000000;
        }

        .checkout-btn {
            padding: 14px 24px;
            font-size: 18px;
            border-radius: 12px;
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/header :: siteHeader}"></div>

<div class="cart-container">

    <div class="cart-card">

        <h3 class="fw-bold mb-4">Giỏ hàng của bạn</h3>

        <!-- EMPTY CART -->
        <div th:if="${#lists.isEmpty(items)}" class="text-center py-5">
            <h5 class="mb-3">Giỏ hàng của bạn đang trống.</h5>
            <a class="btn btn-primary px-4" th:href="@{/products}">
                <i class="fa fa-shopping-bag"></i> Mua sắm ngay
            </a>
        </div>

        <!-- HAS ITEMS -->
        <div th:if="${not #lists.isEmpty(items)}">
            <div th:each="it : ${items}" class="cart-item">

                <!-- IMAGE -->
                <img class="item-img"
                     th:src="@{'/images/' + ${it.image}}"
                     onerror="this.src='https://via.placeholder.com/110?text=No+Img'">

                <!-- INFO -->
                <div class="info">
                    <h5 th:text="${it.name}"></h5>
                    <div class="text-muted small">
                        Mùi: <span th:text="${it.muiLabel}"></span> ·
                        Dung tích: <span th:text="${it.dungtichLabel}"></span>
                    </div>
                    <div class="price"
                         th:text="${#numbers.formatDecimal(it.unitPrice,0,'COMMA',0,'POINT')} + '₫'"></div>
                </div>

                <!-- QUANTITY -->
                <div class="qty-area">

                    <form th:action="@{/cart/increment}" method="post">
                        <input type="hidden" name="key" th:value="${it.key}">
                        <button type="submit" class="qty-btn">+</button>
                    </form>

                    <div class="fw-bold my-1" th:text="${it.quantity}"></div>

                    <form th:action="@{/cart/decrement}" method="post">
                        <input type="hidden" name="key" th:value="${it.key}">
                        <button type="submit" class="qty-btn">−</button>
                    </form>

                </div>

                <!-- SUBTOTAL -->
                <div class="subtotal"
                     th:text="${#numbers.formatDecimal(it.subtotal,0,'COMMA',0,'POINT')} + '₫'"></div>

                <!-- DELETE -->
                <form th:action="@{/cart/remove}" method="post">
                    <input type="hidden" name="key" th:value="${it.key}">
                    <button type="submit" class="trash-btn">
                        <i class="fa fa-trash"></i>
                    </button>
                </form>

            </div>

            <!-- TOTAL PRICE -->
            <div class="total-box">
                Tổng thanh toán:
                <span th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + '₫'"></span>
            </div>

            <div class="d-flex justify-content-between mt-4">

                <form th:action="@{/cart/clear}" method="post">
                    <button class="btn btn-outline-danger px-4">
                        <i class="fa fa-trash"></i> Xóa toàn bộ
                    </button>
                </form>

                <a class="btn btn-success checkout-btn"
                   th:href="@{/checkout}">
                    <i class="fa fa-credit-card"></i> Tiến hành thanh toán
                </a>
            </div>

        </div>

    </div>

</div>

<div th:replace="~{fragments/footer :: siteFooter}"></div>

</body>
</html>
