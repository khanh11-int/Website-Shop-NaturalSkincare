<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đơn hàng của tôi - ShopSkincare</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="container my-4">
    <h4 class="mb-3"><i class="fa fa-list-alt mr-2"></i>Đơn hàng của tôi</h4>

    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">Bạn chưa có đơn hàng nào.</div>

    <div class="card border-0 shadow-sm mb-3" th:each="o : ${orders}">
        <div class="card-header bg-white d-flex justify-content-between">
            <span><b>Mã đơn:</b> <span th:text="${o.orderId}"></span> - <span th:text="${o.ngaydat}"></span> | <span class="badge badge-info" th:text="${o.trangthaiLabel}"></span></span>
            <span class="text-danger font-weight-bold" th:text="${#numbers.formatDecimal(o.tongtien, 0, 'COMMA', 0, 'POINT')} + ' đ'"></span>
        </div>
        <ul class="list-group list-group-flush">
            <li class="list-group-item" th:each="i : ${o.items}">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="font-weight-bold" th:text="${i.productName}"></div>
                        <small class="text-muted">Mùi: <span th:text="${i.muihuong}"></span> | Dung tích: <span th:text="${i.dungtich}"></span>ml | SL: <span th:text="${i.quantity}"></span></small>
                    </div>
                    <div class="text-danger" th:text="${#numbers.formatDecimal(i.thanhtien, 0, 'COMMA', 0, 'POINT')} + ' đ'"></div>
                </div>
            </li>
        </ul>
    </div>
</main>

<div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
