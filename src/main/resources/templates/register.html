<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - ShopSkincare</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<!-- Header -->
<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="container my-4">
    <div class="row justify-content-center">
        <div class="col-md-7 col-lg-6">
        <div class="card border-0 shadow-sm">
                <div class="card-header bg-white text-center border-0 pt-3 pb-2">
                    <h4 class="text-secondary mb-1">
                        <i class="fa fa-user-plus mr-2"></i> Đăng ký tài khoản
                    </h4>
                    <small class="text-muted">Tạo tài khoản để mua hàng dễ dàng hơn</small>
                </div>

                <div class="card-body px-4 pb-3">
                    <form th:action="@{/register}" th:object="${khachhang}" method="post" novalidate>

                        <!-- Thông báo lỗi tổng quát -->
                        <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger text-center mb-3">
                            Vui lòng kiểm tra lại các trường thông tin chưa hợp lệ.
                        </div>

                        <div class="form-group mb-2">
                            <label class="small font-weight-bold mb-1">Họ và tên</label>
                            <input th:field="*{tenkh}" class="form-control form-control-sm" placeholder="Nhập họ và tên">
                            <small class="text-danger" th:if="${#fields.hasErrors('tenkh')}"
                                   th:text="${#fields.errors('tenkh')[0]}"></small>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6 mb-2">
                                <label class="small font-weight-bold mb-1">Tên đăng nhập</label>
                                <input th:field="*{username}" class="form-control form-control-sm" placeholder="Tối thiểu 4 ký tự">
                                <small class="text-danger" th:if="${#fields.hasErrors('username')}"
                                       th:text="${#fields.errors('username')[0]}"></small>
                            </div>
                            <div class="form-group col-md-6 mb-2">
                                <label class="small font-weight-bold mb-1">Email</label>
                                <input th:field="*{email}" class="form-control form-control-sm" placeholder="Nhập email hợp lệ">
                                <small class="text-danger" th:if="${#fields.hasErrors('email')}"
                                       th:text="${#fields.errors('email')[0]}"></small>
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group col-md-6 mb-2">
                                <label class="small font-weight-bold mb-1">Mật khẩu</label>
                                <input type="password" th:field="*{matkhau}" class="form-control form-control-sm"
                                       placeholder="Ít nhất 6 ký tự">
                                <small class="text-danger" th:if="${#fields.hasErrors('matkhau')}"
                                       th:text="${#fields.errors('matkhau')[0]}"></small>
                            </div>
                            <div class="form-group col-md-6 mb-2">
                                <label class="small font-weight-bold mb-1">Xác nhận</label>
                                <input type="password" th:field="*{confirmPassword}" class="form-control form-control-sm"
                                       placeholder="Nhập lại mật khẩu">
                                <small class="text-danger" th:if="${#fields.hasErrors('confirmPassword')}"
                                       th:text="${#fields.errors('confirmPassword')[0]}"></small>
                            </div>
                        </div>

                        <div class="form-group mb-2">
                            <label class="small font-weight-bold mb-1">Địa chỉ (tùy chọn)</label>
                            <input th:field="*{diachi}" class="form-control form-control-sm"
                                   placeholder="Nhập địa chỉ (nếu có)">
                        </div>

                        <div class="form-group mb-3">
                            <label class="small font-weight-bold mb-1">Số điện thoại</label>
                            <input th:field="*{sodienthoai}" class="form-control form-control-sm"
                                   placeholder="VD: 0912345678">
                            <small class="text-danger" th:if="${#fields.hasErrors('sodienthoai')}"
                                   th:text="${#fields.errors('sodienthoai')[0]}"></small>
                        </div>

                        <div class="d-flex justify-content-between align-items-center mt-4">
                            <a th:href="@{/login}" class="text-secondary small">
                                <i class="fa fa-sign-in mr-1"></i> Đăng nhập
                            </a>
                            <button type="submit" class="btn btn-secondary btn-sm px-3">
                                <i class="fa fa-user-plus mr-1"></i> Đăng ký
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Footer -->
<div th:replace="~{fragments/footer :: siteFooter}"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
