<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thông tin cá nhân - ShopSkincare</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <style>
        .profile-card { border-radius: 10px; max-width: 700px; margin: auto; background: #fff; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .profile-header { background: #f8f9fa; border-bottom: 1px solid #dee2e6; padding: 1rem 1.5rem; }
        .profile-body { padding: 1.5rem; }
        .info-label { font-weight: 600; color: #6c757d; width: 160px; }
        .info-value { color: #343a40; }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="container my-4">
    <div class="profile-card">
        <div class="profile-header d-flex justify-content-between align-items-center">
            <div>
                <h4><i class="fa fa-user-circle mr-2 text-secondary"></i> Thông tin cá nhân</h4>
                <small class="text-muted" th:text="${khachhang.tenkh}"></small>
            </div>
            <a th:href="@{/logout}" class="btn btn-outline-secondary btn-sm">
                <i class="fa fa-sign-out"></i> Đăng xuất
            </a>
        </div>

        <div class="profile-body">
            <!-- Thông tin hiển thị -->
            <div id="viewSection" th:if="${khachhang != null}">
                <div class="d-flex mb-2">
                    <div class="info-label">Tên đăng nhập:</div>
                    <div class="info-value" th:text="${khachhang.username}"></div>
                </div>
                <div class="d-flex mb-2">
                    <div class="info-label">Họ và tên:</div>
                    <div class="info-value" th:text="${khachhang.tenkh}"></div>
                </div>
                <div class="d-flex mb-2">
                    <div class="info-label">Email:</div>
                    <div class="info-value" th:text="${khachhang.email}"></div>
                </div>
                <div class="d-flex mb-2">
                    <div class="info-label">Số điện thoại:</div>
                    <div class="info-value" th:text="${khachhang.sodienthoai}"></div>
                </div>
                <div class="d-flex mb-2">
                    <div class="info-label">Địa chỉ:</div>
                    <div class="info-value" th:text="${khachhang.diachi} ?: 'Chưa cập nhật'"></div>
                </div>

                <div class="text-right mt-3">
                    <button class="btn btn-secondary btn-sm" id="editBtn">
                        <i class="fa fa-edit mr-1"></i> Chỉnh sửa thông tin
                    </button>
                </div>
            </div>

            <!-- Form chỉnh sửa (ẩn mặc định) -->
            <form th:action="@{/profile/update}" th:object="${khachhang}" method="post" id="editSection" style="display: none;">
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input th:field="*{tenkh}" class="form-control form-control-sm">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input th:field="*{email}" type="email" class="form-control form-control-sm">
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input th:field="*{sodienthoai}" class="form-control form-control-sm">
                </div>
                <div class="form-group">
                    <label>Địa chỉ</label>
                    <textarea th:field="*{diachi}" class="form-control form-control-sm" rows="2"></textarea>
                </div>

                <div class="text-right">
                    <button type="button" class="btn btn-outline-secondary btn-sm" id="cancelBtn">Hủy</button>
                    <button type="submit" class="btn btn-success btn-sm">
                        <i class="fa fa-save mr-1"></i> Lưu thay đổi
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: siteFooter}"></div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Toggle giữa xem và chỉnh sửa
    document.getElementById("editBtn").addEventListener("click", function() {
        document.getElementById("viewSection").style.display = "none";
        document.getElementById("editSection").style.display = "block";
    });
    document.getElementById("cancelBtn").addEventListener("click", function() {
        document.getElementById("editSection").style.display = "none";
        document.getElementById("viewSection").style.display = "block";
    });
</script>
</body>
</html>
