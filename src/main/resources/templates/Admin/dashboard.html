<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard - ShopSkincare</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="container my-4">
    <h3 class="mb-3"><i class="fa fa-dashboard mr-2"></i>Trang quản trị</h3>

    <div class="row mb-4">
        <div class="col-md-4 mb-2"><div class="card border-0 shadow-sm"><div class="card-body"><small>Tài khoản</small><h4 th:text="${totalAccounts}">0</h4></div></div></div>
        <div class="col-md-4 mb-2"><div class="card border-0 shadow-sm"><div class="card-body"><small>Sản phẩm</small><h4 th:text="${totalProducts}">0</h4></div></div></div>
        <div class="col-md-4 mb-2"><div class="card border-0 shadow-sm"><div class="card-body"><small>Đơn hàng</small><h4 th:text="${totalOrders}">0</h4></div></div></div>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white"><b>Quản lý tài khoản</b></div>
        <div class="table-responsive">
            <table class="table table-sm mb-0">
                <thead><tr><th>ID</th><th>Tên</th><th>Username</th><th>Email</th><th>SĐT</th></tr></thead>
                <tbody>
                <tr th:each="a : ${accounts}">
                    <td th:text="${a.makh}"></td>
                    <td th:text="${a.tenkh}"></td>
                    <td th:text="${a.username}"></td>
                    <td th:text="${a.email}"></td>
                    <td th:text="${a.sodienthoai}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white"><b>Quản lý sản phẩm</b></div>
        <div class="table-responsive">
            <table class="table table-sm mb-0">
                <thead><tr><th>ID</th><th>Sản phẩm</th><th>Tồn kho</th><th>Trạng thái</th></tr></thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <td th:text="${p.masp}"></td>
                    <td th:text="${p.tensp}"></td>
                    <td th:text="${stockMap[p.masp] != null ? stockMap[p.masp] : 0}"></td>
                    <td>
                        <span class="badge badge-success" th:if="${p.tinhtrang == 1}">Hiển thị</span>
                        <span class="badge badge-secondary" th:if="${p.tinhtrang != 1}">Ẩn khi hết hàng</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white"><b>Quản lý đơn hàng</b></div>
        <div class="table-responsive">
            <table class="table table-sm mb-0">
                <thead><tr><th>Mã đơn</th><th>Ngày đặt</th><th>Số SP</th><th>Tổng tiền</th></tr></thead>
                <tbody>
                <tr th:each="o : ${orders}">
                    <td th:text="${o.orderId}"></td>
                    <td th:text="${o.ngaydat}"></td>
                    <td th:text="${#lists.size(o.items)}"></td>
                    <td th:text="${#numbers.formatDecimal(o.tongtien, 0, 'COMMA', 0, 'POINT')} + ' đ'"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
