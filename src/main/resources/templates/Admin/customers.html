<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý khách hàng</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: siteHeader}"></div>
<main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Quản lý khách hàng</h4>
        <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">Về dashboard</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white"><b>Thêm khách hàng</b></div>
        <div class="card-body">
            <form th:action="@{/admin/customers/create}" method="post">
                <div class="form-row">
                    <div class="form-group col-md-3"><input class="form-control form-control-sm" name="tenkh" placeholder="Họ tên" required></div>
                    <div class="form-group col-md-2"><input class="form-control form-control-sm" name="username" placeholder="Username" required></div>
                    <div class="form-group col-md-3"><input type="email" class="form-control form-control-sm" name="email" placeholder="Email" required></div>
                    <div class="form-group col-md-2"><input class="form-control form-control-sm" name="sodienthoai" placeholder="SĐT"></div>
                    <div class="form-group col-md-2"><input class="form-control form-control-sm" name="matkhau" placeholder="Mật khẩu" required></div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6"><input class="form-control form-control-sm" name="diachi" placeholder="Địa chỉ"></div>
                    <div class="form-group col-md-3">
                        <select name="roleId" class="form-control form-control-sm" required>
                            <option th:each="r : ${roles}" th:value="${r.id}" th:text="${r.name}"></option>
                        </select>
                    </div>
                    <div class="form-group col-md-3"><button class="btn btn-dark btn-sm btn-block">Thêm khách hàng</button></div>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-sm mb-0">
                <thead><tr><th>ID</th><th>Tên</th><th>Username</th><th>Email</th><th>Role</th><th>Cập nhật</th><th>Xoá</th></tr></thead>
                <tbody>
                <tr th:each="c : ${customers}">
                    <form th:action="@{/admin/customers/{id}/update(id=${c.makh})}" method="post">
                        <td th:text="${c.makh}"></td>
                        <td><input class="form-control form-control-sm" name="tenkh" th:value="${c.tenkh}" required></td>
                        <td th:text="${c.username}"></td>
                        <td><input class="form-control form-control-sm" name="email" th:value="${c.email}" required></td>
                        <td>
                            <select name="roleId" class="form-control form-control-sm">
                                <option th:each="r : ${roles}" th:selected="${c.role != null and c.role.id == r.id}" th:value="${r.id}" th:text="${r.name}"></option>
                            </select>
                        </td>
                        <td>
                            <input class="form-control form-control-sm mb-1" name="sodienthoai" th:value="${c.sodienthoai}" placeholder="SĐT">
                            <input class="form-control form-control-sm mb-1" name="diachi" th:value="${c.diachi}" placeholder="Địa chỉ">
                            <input class="form-control form-control-sm" name="matkhau" placeholder="Mật khẩu mới (nếu đổi)">
                            <button class="btn btn-primary btn-sm mt-1">Lưu</button>
                        </td>
                    </form>
                    <td>
                        <form th:action="@{/admin/customers/{id}/delete(id=${c.makh})}" method="post" onsubmit="return confirm('Xoá khách hàng này?')">
                            <button class="btn btn-danger btn-sm">Xoá</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
