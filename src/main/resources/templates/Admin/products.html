<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
</head>
<body class="bg-light">
<div th:replace="~{fragments/header :: siteHeader}"></div>
<main class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>Quản lý sản phẩm</h4>
        <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">Về dashboard</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <div class="card border-0 shadow-sm mb-4">
        <div class="card-header bg-white"><b>Thêm sản phẩm</b></div>
        <div class="card-body">
            <form th:action="@{/admin/products/create}" method="post">
                <div class="form-row">
                    <div class="form-group col-md-3"><input class="form-control form-control-sm" name="tensp" placeholder="Tên sản phẩm" required></div>
                    <div class="form-group col-md-2"><input class="form-control form-control-sm" type="number" name="giamgia" value="0" min="0"></div>
                    <div class="form-group col-md-2"><input class="form-control form-control-sm" name="hinh" placeholder="Tên ảnh" required></div>
                    <div class="form-group col-md-2">
                        <select class="form-control form-control-sm" name="maloai">
                            <option th:each="l : ${categories}" th:value="${l.maloai}" th:text="${l.tenloai}"></option>
                        </select>
                    </div>
                    <div class="form-group col-md-3"><input class="form-control form-control-sm" name="thuonghieu" placeholder="Thương hiệu"></div>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6"><input class="form-control form-control-sm" name="mota" placeholder="Mô tả"></div>
                    <div class="form-group col-md-2"><select class="form-control form-control-sm" name="dacbiet"><option value="0">Thường</option><option value="1">Đặc biệt</option></select></div>
                    <div class="form-group col-md-2"><select class="form-control form-control-sm" name="tinhtrang"><option value="1">Hiển thị</option><option value="0">Ẩn</option></select></div>
                    <div class="form-group col-md-2"><button class="btn btn-dark btn-sm btn-block">Thêm sản phẩm</button></div>
                </div>
            </form>
        </div>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-sm mb-0">
                <thead><tr><th>ID</th><th>Tên</th><th>Loại</th><th>Tồn kho</th><th>Giảm</th><th>Trạng thái</th><th>Cập nhật</th><th>Xoá</th></tr></thead>
                <tbody>
                <tr th:each="p : ${products}">
                    <form th:action="@{/admin/products/{id}/update(id=${p.masp})}" method="post">
                        <td th:text="${p.masp}"></td>
                        <td>
                            <input class="form-control form-control-sm mb-1" name="tensp" th:value="${p.tensp}">
                            <input class="form-control form-control-sm mb-1" name="hinh" th:value="${p.hinh}" placeholder="Ảnh">
                            <input class="form-control form-control-sm" name="thuonghieu" th:value="${p.thuonghieu}" placeholder="Thương hiệu">
                        </td>
                        <td><select class="form-control form-control-sm" name="maloai"><option th:each="l : ${categories}" th:value="${l.maloai}" th:selected="${l.maloai == p.maloai}" th:text="${l.tenloai}"></option></select></td>
                        <td th:text="${stockMap[p.masp] != null ? stockMap[p.masp] : 0}"></td>
                        <td><input type="number" min="0" class="form-control form-control-sm" name="giamgia" th:value="${p.giamgia}"></td>
                        <td>
                            <select class="form-control form-control-sm mb-1" name="tinhtrang"><option value="1" th:selected="${p.tinhtrang == 1}">Hiển thị</option><option value="0" th:selected="${p.tinhtrang != 1}">Ẩn</option></select>
                            <select class="form-control form-control-sm" name="dacbiet"><option value="1" th:selected="${p.dacbiet}">Đặc biệt</option><option value="0" th:selected="${!p.dacbiet}">Thường</option></select>
                        </td>
                        <td>
                            <input class="form-control form-control-sm mb-1" name="mota" th:value="${p.mota}" placeholder="Mô tả">
                            <button class="btn btn-primary btn-sm">Lưu</button>
                        </td>
                    </form>
                    <td>
                        <form th:action="@{/admin/products/{id}/delete(id=${p.masp})}" method="post" onsubmit="return confirm('Xoá sản phẩm này?')">
                            <button class="btn btn-danger btn-sm">Xoá</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
