<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý sản phẩm</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
</head>
<body class="bg-light admin-page">
<div th:replace="~{fragments/header :: siteHeader}"></div>
<main class="container my-4">
        <div class="admin-toolbar mb-3">
            <h4 class="mb-0"><i class="fa fa-cube mr-2"></i>Quản lý sản phẩm</h4>
            <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm"><i class="fa fa-arrow-left mr-1"></i>Về dashboard</a>
        </div>

        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <div class="card border-0 shadow-sm mb-4 admin-panel">
                <div class="card-header bg-white"><b>Thêm sản phẩm mới</b></div>
                <div class="card-body">
                        <form th:action="@{/admin/products/create}" method="post" class="admin-form">
                            <div class="form-row">
                                    <div class="form-group col-lg-3 col-md-6"><input class="form-control form-control-sm" name="tensp" placeholder="Tên sản phẩm" required></div>
                                    <div class="form-group col-lg-2 col-md-6"><input class="form-control form-control-sm" type="number" name="giamgia" value="0" min="0" placeholder="Giảm giá"></div>
                                    <div class="form-group col-lg-2 col-md-6"><input class="form-control form-control-sm" name="hinh" placeholder="Tên ảnh" required></div>
                                    <div class="form-group col-lg-2 col-md-6">
                                        <select class="form-control form-control-sm" name="maloai">
                                            <option th:each="l : ${categories}" th:value="${l.maloai}" th:text="${l.tenloai}"></option>
                                        </select>
                                    </div>
                                    <div class="form-group col-lg-3 col-md-6"><input class="form-control form-control-sm" name="thuonghieu" placeholder="Thương hiệu"></div>
                                </div>
                                <div class="form-row">
                                    <div class="form-group col-lg-6 col-md-12"><input class="form-control form-control-sm" name="mota" placeholder="Mô tả"></div>
                                    <div class="form-group col-lg-2 col-md-6"><select class="form-control form-control-sm" name="dacbiet"><option value="0">Thường</option><option value="1">Đặc biệt</option></select></div>
                                    <div class="form-group col-lg-2 col-md-6"><select class="form-control form-control-sm" name="tinhtrang"><option value="1">Hiển thị</option><option value="0">Ẩn</option></select></div>
                                    <div class="form-group col-lg-2 col-md-6"><button class="btn btn-dark btn-sm btn-block">Thêm sản phẩm</button></div>
                                </div>
                        </form>
                </div>
            </div>

                        <div class="card border-0 shadow-sm admin-panel">
                            <div class="table-responsive admin-table-wrap">
                                <table class="table table-sm mb-0 admin-table">
                                    <thead><tr><th>ID</th><th>Tên & ảnh</th><th>Loại</th><th>Tồn kho</th><th>Giảm</th><th>Trạng thái</th><th>Mô tả & cập nhật</th><th>Xoá</th></tr></thead>
                                    <tbody>
                                    <tr th:each="p : ${products}">
                                        <form th:action="@{/admin/products/{id}/update(id=${p.masp})}" method="post">
                                            <td class="font-weight-bold text-muted" th:text="${p.masp}"></td>
                                            <td>
                                                <div class="admin-action-stack">
                                                    <input class="form-control form-control-sm" name="tensp" th:value="${p.tensp}">
                                                    <input class="form-control form-control-sm" name="hinh" th:value="${p.hinh}" placeholder="Ảnh">
                                                    <input class="form-control form-control-sm" name="thuonghieu" th:value="${p.thuonghieu}" placeholder="Thương hiệu">
                                                </div>
                                            </td>
                                            <td><select class="form-control form-control-sm" name="maloai"><option th:each="l : ${categories}" th:value="${l.maloai}" th:selected="${l.maloai == p.maloai}" th:text="${l.tenloai}"></option></select></td>
                                            <td><span class="badge badge-light border px-2 py-1" th:text="${stockMap[p.masp] != null ? stockMap[p.masp] : 0}"></span></td>
                                            <td><input type="number" min="0" class="form-control form-control-sm" name="giamgia" th:value="${p.giamgia}"></td>
                                            <td>
                                                <div class="admin-action-stack">
                                                    <select class="form-control form-control-sm" name="tinhtrang"><option value="1" th:selected="${p.tinhtrang == 1}">Hiển thị</option><option value="0" th:selected="${p.tinhtrang != 1}">Ẩn</option></select>
                                                    <select class="form-control form-control-sm" name="dacbiet"><option value="1" th:selected="${p.dacbiet}">Đặc biệt</option><option value="0" th:selected="${!p.dacbiet}">Thường</option></select>
                                                </div>
                                            </td>
                                            <td>
                                                <div class="admin-action-stack">
                                                    <input class="form-control form-control-sm" name="mota" th:value="${p.mota}" placeholder="Mô tả">
                                                    <button class="btn btn-primary btn-sm align-self-start"><i class="fa fa-save mr-1"></i>Lưu</button>
                                                </div>
                                            </td>
                                        </form>
                                        <td>
                                            <form th:action="@{/admin/products/{id}/delete(id=${p.masp})}" method="post" onsubmit="return confirm('Xoá sản phẩm này?')">
                                                <button class="btn btn-danger btn-sm"><i class="fa fa-trash"></i></button>
                                            </form>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
</main>
<div th:replace="~{fragments/footer :: siteFooter}"></div>
</body>
</html>
