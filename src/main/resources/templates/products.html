<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8" />
    <title>Tất cả sản phẩm</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <!-- Font Awesome (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.css">
    <!-- CSS riêng -->
    <link rel="stylesheet" th:href="@{/css/products.css}">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        /* đảm bảo badge sale nổi ở góc ảnh */
        .badge-sale{position:absolute;top:10px;left:10px}
    </style>
</head>
<body>

<!-- Header -->
<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="container py-4">

    <div class="d-flex align-items-center justify-content-between mb-3">
        <h2 class="mb-0 font-weight-bold">Tất cả sản phẩm</h2>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/}">← Về trang chủ</a>
    </div>

    <!-- Grid sản phẩm -->
    <div class="row">
        <div class="col-6 col-md-4 col-lg-3 mb-4" th:each="p : ${products}">
            <div class="card h-100 product-card shadow-sm border-0 position-relative">

                <!-- Badge % giảm (chỉ khi có dongia & giamgia) -->
                <span class="badge badge-danger badge-sale"
                      th:if="${p.dongia != null and p.dongia > 0 and p.giamgia != null and p.giamgia > 0}"
                      th:text="'-' + ${#numbers.formatDecimal((p.giamgia / p.dongia) * 100, 0, 0)} + '%'">-10%</span>

                <a class="d-block" th:href="@{'/product/' + ${p.masp}}">
                    <img class="card-img-top product-img"
                         th:src="@{'/images/' + ${p.hinh}}"
                         th:alt="${p.tensp}">
                </a>

                <div class="card-body d-flex flex-column">
                    <h6 class="product-name mb-2" th:text="${p.tensp}">Tên sản phẩm</h6>

                    <div class="mb-2">
                        <span class="brand-chip" th:if="${p.thuonghieu != null}" th:text="${p.thuonghieu}">Brand</span>
                    </div>

                    <!-- Giá -->
                    <div class="mt-auto">

                        <!-- Trường hợp chuẩn: có giá gốc (dongia) -->
                        <div th:if="${p.dongia != null and p.dongia > 0}">
                            <!-- Có giảm -->
                            <div th:if="${p.giamgia != null and p.giamgia > 0}">
                <small class="text-muted ml-2"><s th:text="${#numbers.formatDecimal(p.dongia,  0, 'COMMA', 0, 'POINT')} + ' ₫'">149.000₫</s></small>
                <span class="price text-danger font-weight-bold" th:text="${#numbers.formatDecimal(p.dongia - p.giamgia,  0, 'COMMA', 0, 'POINT')} + ' ₫'">129.000₫</span>
                            </div>
                            <!-- Không giảm -->
                            <div th:if="${p.giamgia == null or p.giamgia == 0}">
                <span class="price font-weight-bold"
                      th:text="${#numbers.formatDecimal(p.dongia,  0, 'COMMA', 0, 'POINT')} + '₫'">149.000₫</span>
                            </div>
                        </div>

                        <!-- Fallback: không có dongia ⇒ dùng giamgia như giá bán -->
                        <div th:if="${p.dongia == null or p.dongia == 0}">
              <span class="price text-danger font-weight-bold"
                    th:text="${p.giamgia != null and p.giamgia > 0} ? ${#numbers.formatDecimal(p.giamgia,0,0)} + ' ₫' : 'Liên hệ'">Liên hệ</span>
                        </div>

                    </div>
                </div>
            </div>
        </div>

        <!-- Empty -->
        <div class="col-12" th:if="${#lists.isEmpty(products)}">
            <div class="alert alert-light border text-center mb-0">
                Chưa có sản phẩm.
            </div>
        </div>
    </div>

</main>

<!-- Footer -->
<div th:replace="~{fragments/footer :: siteFooter}"></div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
