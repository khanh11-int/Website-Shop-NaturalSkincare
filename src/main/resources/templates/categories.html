<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8" />
    <title>Danh mục sản phẩm</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .category-card {
            border: 0;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0,0,0,.08);
            transition: transform .2s, box-shadow .2s;
            text-align: center;
            overflow: hidden;
            background: #fff;
        }
        .category-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 25px rgba(0,0,0,.12);
        }
        .category-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid #eee;
        }
        .category-name {
            font-weight: 600;
            padding: 12px 8px;
            color: #333;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/header :: siteHeader}"></div>

<main class="container py-4">
    <div class="d-flex align-items-center justify-content-between mb-4">
        <h2 class="mb-0 font-weight-bold">Danh mục sản phẩm</h2>
        <a class="btn btn-outline-secondary btn-sm" th:href="@{/}">← Về trang chủ</a>
    </div>

    <div class="row">
        <!-- Lặp qua tất cả loại -->
        <div class="col-6 col-md-4 col-lg-3 mb-4" th:each="c : ${categories}">
            <a th:href="@{/loai/{id}(id=${c.maloai})}" class="text-decoration-none text-dark">
                <div class="category-card h-100">
                    <div class="category-name" th:text="${c.tenloai}">Tên loại</div>
                </div>
            </a>
        </div>

        <!-- Nếu chưa có loại nào -->
        <div class="col-12" th:if="${#lists.isEmpty(categories)}">
            <div class="alert alert-light border text-center mb-0">
                Chưa có loại sản phẩm nào.
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/footer :: siteFooter}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
